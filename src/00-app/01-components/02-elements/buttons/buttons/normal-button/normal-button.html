
<!-- richtig modulare button dass man überall nutzen kann mit möglichkeit den icon zu button hinzufügen -->
<button class="arrow-btn">
  <span class="btn-text"><ng-content></ng-content></span>
  
  @if (iconPath) {
    <img [src]="iconPath" alt="Button Icon" class="btn-icon">
  }
</button>
